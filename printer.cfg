# Pin Mappings for Stock 2023 Creality Ender 3 V3 SE
#
# To use this configuration:
# 1. During "make menuconfig", select:
#    - STM32F103 with a "28KiB bootloader"
#    - Serial communication on USART1 (PA10/PA9)
#
# 2. For a direct serial connection:
#    - In "make menuconfig", select:
#      - "Enable extra low-level configuration options"
#      - Serial communication on USART3 (PB11/PB10)
#    - This is accessible via the 10-pin IDC cable used for the LCD module:
#      - Pin 3: Tx
#      - Pin 4: Rx
#      - Pin 9: GND
#      - Pin 10: VCC
#
# 3. Build the firmware by running:
#    - make
#
# 4. Flash the firmware:
#    - Copy "klipper/out/klipper.bin" to an SD card.
#    - Insert the SD card into the printer and power it on.
#    - Ensure the firmware filename ends in ".bin" and is different from the last flashed filename.
#
# For further details, refer to https://www.klipper3d.org/Config_Reference.html.

#####################################################################
# Include the relevant configuration depending on what you are using.
#####################################################################

[include fluidd.cfg]
# [include mainsail.cfg]

[exclude_object]

#[include KAMP_Settings.cfg]

[include macros.cfg]
#[include adxl.cfg]

[mcu eddy]
serial: /dev/serial/by-id/usb-Klipper_rp2040_50443404109B8A1C-if00
restart_method: command


[temperature_sensor btt_eddy_mcu]
sensor_type: temperature_mcu
sensor_mcu: eddy
min_temp: 10
max_temp: 100

[probe_eddy_current btt_eddy]
descend_z: 3.5
sensor_type: ldc1612

i2c_mcu: eddy
i2c_bus: i2c0f
x_offset: -36.5
y_offset: -16

[temperature_probe btt_eddy]
sensor_type: Generic 3950
sensor_pin: eddy:gpio26
horizontal_move_z: 2


[input_shaper]
shaper_type_x: mzv
shaper_freq_x: 36.0
shaper_type_y: mzv
shaper_freq_y: 38.2

[mcu]
#####################################################################
# Obtain definition by "ls -l /dev/serial/by-id/"
#####################################################################
#serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command


[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[printer]
kinematics: cartesian
max_velocity: 250
max_accel: 2000
minimum_cruise_ratio: 0.5
square_corner_velocity: 5.0
max_z_velocity: 100
max_z_accel: 500

#####################################################################
#   X/Y Stepper Settings
#####################################################################

[stepper_x]
step_pin: PC2
dir_pin: !PB9
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: !PA5
position_endstop: -6
position_min: -6
position_max: 230
homing_speed: 60

[tmc2209 stepper_x]
uart_pin: PB12
run_current: 0.6
sense_resistor: 0.150
stealthchop_threshold: 0
interpolate: True

[stepper_y]
step_pin: PB8
dir_pin: PB7
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: !PA6
position_endstop: -14
position_min: -14
position_max: 225
homing_speed: 60

[tmc2209 stepper_y]
uart_pin: PB13
run_current: 0.6
sense_resistor: 0.150
stealthchop_threshold: 0
interpolate: True

#####################################################################
#   Z Stepper Settings
#####################################################################

[stepper_z]
step_pin: PB6
dir_pin: !PB5
enable_pin: !PC3
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_min: -3
position_max: 250
homing_speed: 5
second_homing_speed: 1
homing_retract_dist: 0

[tmc2209 stepper_z]
uart_pin: PB14
run_current: 0.8
sense_resistor: 0.150
stealthchop_threshold: 0
interpolate: True

#####################################################################
#   Extruder
#####################################################################

[extruder]
step_pin: PB4
dir_pin: PB3
enable_pin: !PC3
microsteps: 16
rotation_distance: 7.663
nozzle_diameter: 0.400
filament_diameter: 1.750
max_extrude_cross_section: 5
max_extrude_only_distance: 500

# INFO : Flow Ratio : 1

## Kexcelled PLA Matte
#pressure_advance: 0.08
#pressure_advance_smooth_time: 0.01

## JAYO PETG
pressure_advance: 0.16
pressure_advance_smooth_time: 0.04

heater_pin: PA1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC5
#control: pid
# Tuned for stock hardware with a target of 200 degrees Celsius.
#pid_Kp: 27.142
#pid_Ki: 1.371
#pid_Kd: 134.351
min_temp: 0
max_temp: 260

#####################################################################
#   Bed Heater
#####################################################################

[heater_bed]
heater_pin: PB2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
#control: pid
# Tuned for stock hardware with a target of 70 degrees Celsius.
#pid_kp: 66.371
#pid_ki: 0.846
#pid_kd: 1301.702
min_temp: 0
max_temp: 100

#####################################################################
#   Bed Mesh & BL Touch
#####################################################################

[bed_mesh]
horizontal_move_z: 3.5
speed: 150
mesh_min: 20,10
mesh_max: 188,204
probe_count: 10, 10
algorithm: bicubic

#[bltouch_DISABLED]
#sensor_pin: ^PC14
#control_pin: PC13
#stow_on_each_sample: False
#probe_with_touch_mode: True
#x_offset: -24.0
#y_offset: -14.5
##z_offset: 0
#speed: 5
#samples: 3
#lift_speed: 10

#####################################################################
#   Fan Control
#####################################################################

[heater_fan hotend_fan]
pin: PC1

[fan]
pin: PA0

#####################################################################
#   Idle Timeout & Homing
#####################################################################

[idle_timeout]
gcode:
  OFF
timeout: 600

[safe_z_home]
home_xy_position: 151.5, 118
speed: 60
z_hop: 0
z_hop_speed: 5
[force_move]
enable_force_move: True

[gcode_macro G28]
rename_existing: G28.1
gcode:
    G28.1 X Y
    {% if 'Z' in rawparams or rawparams == '' %}
        G90
        G1 X151.5 Y118 F6000  ; sensor centered (nozzle offset compensated)
        SET_STEPPER_ENABLE STEPPER=stepper_z
        FORCE_MOVE STEPPER=stepper_z DISTANCE=10 VELOCITY=5  ; guarantee clearance before homing, regardless of prior Z
        SET_KINEMATIC_POSITION Z=3
        G28.1 Z
        G1 Z3 F600
        G1 Z4 F600
        G1 Z3.5 F600  ; step lift, never exceed 4mm (eddy calib ceiling ~4.05)
    {% endif %}

[gcode_macro SET_Z_FROM_PROBE]
gcode:
    G90
    G1 Z{ printer.probe.last_z_result } F300

[gcode_macro SET_GCODE_OFFSET]
rename_existing: SET_GCODE_OFFSET_ORIG
variable_runtime_offset: 0
variable_restored: False
gcode:
    SET_GCODE_OFFSET_ORIG { rawparams }

#####################################################################
#   Beeper
#####################################################################

[output_pin beeper]
pin: PB0

#####################################################################
#   G-Code features
#####################################################################

[gcode_arcs]

[exclude_object]

